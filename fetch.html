<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>面板选择器</title>
    <style>
        .google-loader {
            display: block;
        }

        .google-loader span {
            display: inline-block;
            margin-top: 10px;
            height: 20px;
            width: 20px;
            border-radius: 50%;
        }

        .google-loader span:not(:first-child) {
            margin-left: 10px;
        }

        .google-loader span:nth-child(1) {
            background: #4285f4;
            cursor: auto;
            animation: move 1s ease-in-out -0.25s infinite alternate;
        }

        .google-loader span:nth-child(2) {
            background: #db4437;
            cursor: auto;
            animation: move 1s ease-in-out -0.5s infinite alternate;
        }

        .google-loader span:nth-child(3) {
            background: #f4b400;
            cursor: auto;
            animation: move 1s ease-in-out -0.75s infinite alternate;
        }

        .google-loader span:nth-child(4) {
            background: #0f9d58;
            cursor: auto;
            animation: move 1s ease-in-out -1s infinite alternate;
        }

        @keyframes move {
            from {
                transform: translateY(-10px);
            }
            to {
                transform: translateY(5px);
            }
        }

        h1 {
            font-family: "Montserrat", sans-serif;
            font-size: 4em;
            text-align: center;
            letter-spacing: -8px;
            margin-top: 0;
        }

        h1 span:first-child {
            color: #4285f4;
            cursor: pointer;
        }

        h1 span:nth-child(2) {
            color: #db4437;
            cursor: auto;
        }

        h1 span:nth-child(3) {
            color: #f4b400;
            cursor: pointer;
        }

        h1 span:nth-child(4) {
            color: #4285f4;
            cursor: auto;
        }

        h1 span:nth-child(5) {
            color: #0f9d58;
            cursor: pointer;
        }

        html,
        body {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
    </style>
</head>
<body>
<h1>
    <span onclick="window.location.href = 'https://192.168.31.200'">1⃣</span>
    <span>·</span>
    <span onclick="window.location.href = 'https://172.16.0.20'">2⃣</span>
    <span>·</span>
    <span onclick="window.location.href = 'https://fn.candyenk.com'">3⃣</span>
</h1>

<div class="google-loader">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>
</body>

</html>
