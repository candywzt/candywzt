<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>正在打开</title>
   <style>
       .google-loader {
           display: block;
       }
       .google-loader span {
           display: inline-block;
           margin-top: 10px;
           height: 20px;
           width: 20px;
           border-radius: 50%;
       }
       .google-loader span:not(:first-child) {
           margin-left: 10px;
       }
       .google-loader span:nth-child(1) {
           background: #4285f4;
           animation: move 1s ease-in-out -0.25s infinite alternate;
       }
       .google-loader span:nth-child(2) {
           background: #db4437;
           animation: move 1s ease-in-out -0.5s infinite alternate;
       }
       .google-loader span:nth-child(3) {
           background: #f4b400;
           animation: move 1s ease-in-out -0.75s infinite alternate;
       }
       .google-loader span:nth-child(4) {
           background: #0f9d58;
           animation: move 1s ease-in-out -1s infinite alternate;
       }

       @keyframes move {
           from {
               transform: translateY(-10px);
           }
           to {
               transform: translateY(5px);
           }
       }
       h1 {
           font-family: "Montserrat", sans-serif;
           font-size: 4em;
           text-align: center;
           letter-spacing: -8px;
           margin-top: 0;
       }
       h1 span:first-child {
           color: #4285f4;
       }
       h1 span:nth-child(2) {
           color: #db4437;
       }
       h1 span:nth-child(3) {
           color: #f4b400;
       }
       h1 span:nth-child(4) {
           color: #4285f4;
       }
       h1 span:nth-child(5) {
           color: #0f9d58;
       }
       h1 span:last-child {
           color: #db4437;
           transform: rotate(-20deg);
           display: inline-block;
       }

       html,
       body {
           height: 100%;
           display: flex;
           align-items: center;
           justify-content: center;
           flex-direction: column;
       }
   </style>
</head>
<body>
<h1>
    <span>请</span>
    <span>稍</span>
    <span>侯</span>
    <span>·</span>
    <span>·</span>
    <span>·</span>
</h1>

<div class="google-loader">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>
<script>
    function checkAndRedirect() {
        const urls = ['http://192.168.31.200','http://172.16.0.20','https://home.candyenk.com'];
        const fallbackUrl = 'https://www.candyenk.com';
        function tryNext(index = 0) {
            if (index >= urls.length) {
                window.location.href = fallbackUrl;
                return;
            }
            fetch(urls[index]).then(response => {
                if (response.ok) {
                    window.location.href = urls[index];
                } else {
                    tryNext(index + 1);
                }
            }).catch(() => {
                tryNext(index + 1);
            });
        }
        tryNext();
    }
    // 页面加载后自动执行检测重定向
    window.addEventListener('load', checkAndRedirect);
</script>

</body>

</html>
